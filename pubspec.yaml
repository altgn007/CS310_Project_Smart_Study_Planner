name: smart_study_planner
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Step 4: Backend Implementation ─────────────────────
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State Management
  provider: ^6.1.2

  # Local Persistence
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # AI Coach — OpenAI Chat Completions API
  http: ^1.2.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: Sora
      fonts:
        - asset: fonts/Sora-Regular.ttf
          weight: 400
        - asset: fonts/Sora-Medium.ttf
          weight: 500
        - asset: fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: fonts/Sora-Bold.ttf
          weight: 700
        - asset: fonts/Sora-ExtraBold.ttf
          weight: 800